<!DOCTYPE html>

<body class="text-gray-800 h-screen overflow-hidden flex">

                    <i class="fa-solid fa-compass-drafting"></i>
                </div>
                <h1 class="text-xl font-extrabold text-slate-950 uppercase tracking-tight">A&A Geotechnical</h1>
                <p class="text-xs font-semibold text-blue-600 tracking-wider">Instrumentation & Monitoring Service</p>
            </div>
            
            <div id="login-form" class="space-y-4">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider text-left mb-2">Account Login</h2>
                <input type="text" value="jahan.gir@aangeotech.com" placeholder="Username / Email ID" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">

        </div>

            <a href="#" onclick="showTab('projects')" class="nav-btn block px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-900 hover:text-slate-100 transition"><i class="fa-solid fa-folder w-6 text-base"></i> Project Details</a>
            
            <p class="text-[11px] text-slate-500 uppercase font-bold tracking-wider mb-2 mt-6 px-3">Instrumentation Core</p>

        <div class="p-4 bg-slate-900 border-t border-slate-800 flex items-center">

            <div>
