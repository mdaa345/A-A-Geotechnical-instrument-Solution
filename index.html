<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&A Geotechnical | Enterprise Management Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        @media print {
            aside, header, .no-print { display: none !important; }
            main { width: 100% !important; height: auto !important; overflow: visible !important; }
            .print-full { width: 100% !important; border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 relative">
            
            <div class="absolute top-4 right-4 text-slate-300 hover:text-blue-500 cursor-pointer transition text-xs" title="Admin Channel Security Active">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-50 text-blue-600 text-2xl mb-2 border border-blue-100">
                    <i class="fa-solid fa-compass-drafting"></i>
                </div>
                <h1 class="text-lg font-extrabold text-slate-950 uppercase tracking-tight">A&A Geotechnical</h1>
                <p class="text-[10px] font-bold text-blue-600 tracking-wider">Instrumentation & Monitoring Service</p>
            </div>
            
            <div id="form-signin" class="space-y-4">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Account Portal</h2>
                <input type="text" id="login-username" value="jahan.gir@aangeotech.com" placeholder="Username or Admin ID" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-medium">
                <input type="password" id="login-password" value="••••••••" placeholder="Password" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-medium">
                
                <div class="text-right">
                    <button onclick="toggleLoginViews('forgot')" class="text-[11px] text-blue-600 hover:underline font-medium">Forgot Password?</button>
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition shadow-lg shadow-blue-200 text-xs">Sign In</button>
                
                <div class="text-center pt-2 border-t border-slate-100">
                    <p class="text-[11px] text-slate-500">New to system? <button onclick="toggleLoginViews('signup')" class="text-blue-600 font-bold hover:underline">Create Account</button></p>
                </div>
            </div>

            <div id="form-signup" class="space-y-4 hidden">
                <h2 class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">Create System Registry</h2>
                <input type="text" placeholder="Full Name" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                <input type="email" placeholder="Official Email Address" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                <input type="password" placeholder="Choose Secure Password" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                
                <button onclick="alert('Account request sent to Administration for verification approval.')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl transition text-xs shadow-md">Submit Registration</button>
                
                <div class="text-center pt-2">
                    <button onclick="toggleLoginViews('signin')" class="text-[11px] text-slate-500 hover:underline font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Sign In</button>
                </div>
            </div>

            <div id="form-forgot" class="space-y-4 hidden">
                <h2 class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">Reset Access Key</h2>
                <p class="text-[11px] text-slate-500 leading-relaxed">Enter your registered email address below. System engine will broadcast a password override link.</p>
                <input type="email" placeholder="Enter Email ID" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-amber-500 bg-slate-50">
                
                <button onclick="alert('Password reset handshake token generated and sent via email.')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl transition text-xs shadow-md">Send Override Link</button>
                
                <div class="text-center pt-2">
                    <button onclick="toggleLoginViews('signin')" class="text-[11px] text-slate-500 hover:underline font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Sign In</button>
                </div>
            </div>

        </div>
    </div>

    <aside id="sidebar" class="w-64 bg-slate-950 text-slate-200 flex flex-col hidden h-full border-r border-slate-800 no-print">
        <div class="p-5 border-b border-slate-900 bg-slate-950 text-center">
            <h1 class="text-md font-black text-white uppercase tracking-tight
